board: MKS-DLC32 V2.1
name: XZACt_MiniLathe
meta: Maijker mini lathe config, brought forward from the recovered 2025 XZACt build.

kinematics:
  Cartesian:

# Pendant UART.
# Connect txd_pin gpio.18 to pendant RX, and rxd_pin gpio.23 to pendant TX.
uart1:
  txd_pin: gpio.18
  rxd_pin: gpio.23
  rts_pin: NO_PIN
  cts_pin: NO_PIN
  baud: 1000000
  mode: 8N1

uart_channel1:
  report_interval_ms: 75
  uart_num: 1

stepping:
  engine: I2S_STATIC
  idle_ms: 0
  pulse_us: 4
  dir_delay_us: 1
  disable_delay_us: 0

axes:
  shared_stepper_disable_pin: i2so.0
  x:
    steps_per_mm: 320
    max_rate_mm_per_min: 5000
    acceleration_mm_per_sec2: 500
    max_travel_mm: 60
    soft_limits: true
    homing:
      cycle: 1
      positive_direction: true
      mpos_mm: 60.000
      feed_mm_per_min: 250
      seek_mm_per_min: 400
      settle_ms: 500
      seek_scaler: 1.100
      feed_scaler: 1.100
    motor0:
      limit_neg_pin: gpio.36:low
      hard_limits: true
      pulloff_mm: 2
      stepstick:
        step_pin: i2so.1
        direction_pin: i2so.2

  z:
    steps_per_mm: 320
    max_rate_mm_per_min: 5000
    acceleration_mm_per_sec2: 500
    max_travel_mm: 90
    soft_limits: true
    homing:
      cycle: 2
      positive_direction: true
      mpos_mm: 90.000
      feed_mm_per_min: 250
      seek_mm_per_min: 400
      settle_ms: 500
      seek_scaler: 1.100
      feed_scaler: 1.100
    motor0:
      limit_neg_pin: gpio.34:low
      hard_limits: true
      pulloff_mm: 2
      stepstick:
        step_pin: i2so.3
        direction_pin: i2so.4

  # Tool changer axis. Direction is handled by M62/M63 P0.
  # digital0_pin gpio.5 drives the aux A4988 direction input.
  # i2so.7 drives the aux A4988 step input through the MKS buzzer output.
  a:
    steps_per_mm: 320
    max_rate_mm_per_min: 1000.0
    acceleration_mm_per_sec2: 50.0
    max_travel_mm: 100000
    soft_limits: false
    motor0:
      limit_all_pin: NO_PIN
      limit_neg_pin: NO_PIN
      limit_pos_pin: NO_PIN
      hard_limits: false
      pulloff_mm: 0.000
      stepstick:
        step_pin: i2so.7
        direction_pin: NO_PIN

  # Existing commanded spindle axis from the old build.
  # This is not spindle phase feedback; the lathe encoder below must be a real spindle encoder.
  c:
    steps_per_mm: 533.333
    max_rate_mm_per_min: 2000
    acceleration_mm_per_sec2: 75
    max_travel_mm: 100000
    soft_limits: false
    motor0:
      limit_all_pin: NO_PIN
      limit_neg_pin: NO_PIN
      limit_pos_pin: NO_PIN
      hard_limits: false
      pulloff_mm: 0.000
      stepstick:
        step_pin: i2so.5
        direction_pin: i2so.6

i2so:
  bck_pin: gpio.16
  data_pin: gpio.21
  ws_pin: gpio.17

spi:
  miso_pin: gpio.12
  mosi_pin: gpio.13
  sck_pin: gpio.14

sdcard:
  cs_pin: gpio.15
  card_detect_pin: NO_PIN

control:
  safety_door_pin: NO_PIN
  reset_pin: NO_PIN
  feed_hold_pin: NO_PIN
  cycle_start_pin: NO_PIN
  macro0_pin: NO_PIN
  macro1_pin: NO_PIN
  macro2_pin: NO_PIN
  macro3_pin: NO_PIN

macros:
  startup_line0:
  startup_line1:
  macro0:
  macro1:
  macro2:
  macro3:

coolant:
  flood_pin: NO_PIN
  mist_pin: NO_PIN
  delay_ms: 0

probe:
  pin: gpio.22
  check_mode_start: true

HBridge:
  pwm_hz: 5000
  output_cw_pin: gpio.25
  output_ccw_pin: gpio.26
  enable_pin: gpio.27
  disable_with_s0: true
  s0_with_disable: true
  spinup_ms: 1000
  spindown_ms: 1000
  tool_num: 5
  speed_map: 0=0.000% 2000=100.000%
  off_on_alarm: true
  m6_macro: $SD/Run=maijker_tool_change.gcode

user_outputs:
  analog0_pin: NO_PIN
  analog1_pin: NO_PIN
  analog2_pin: NO_PIN
  analog3_pin: NO_PIN
  analog0_hz: 5000
  analog1_hz: 5000
  analog2_hz: 5000
  analog3_hz: 5000
  digital0_pin: gpio.5
  digital1_pin: NO_PIN
  digital2_pin: NO_PIN
  digital3_pin: NO_PIN

start:
  must_home: true

status_outputs:
  report_interval_ms: 500
  idle_pin: NO_PIN
  run_pin: NO_PIN
  hold_pin: NO_PIN
  alarm_pin: NO_PIN
  door_pin: NO_PIN

lathe:
  enable: true
  enable_css: true
  enable_feed_per_rev: true
  enable_threading: false
  min_css_diameter_mm: 1.000
  max_css_rpm: 2000.000
  x_axis: 0
  z_axis: 2
  feedback_stale_ms: 250
  encoder_enable: false
  # MKS-DLC32 V2.1 candidates after the physical spindle encoder is installed:
  # - gpio.33 on EXP1 is the preferred pulse input candidate because this config does not use it.
  # - gpio.39 on EXP2 is input-only and may be usable for index if SD-card detect is not wired on the board.
  # Keep these disabled until the encoder is physically installed and verified at low spindle speed.
  encoder_pulse_pin: NO_PIN
  encoder_index_pin: NO_PIN
  encoder_pulses_per_rev: 1
